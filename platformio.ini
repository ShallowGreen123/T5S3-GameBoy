[platformio]
; src_dir = examples/epd_gb_frame_probe/main
src_dir = examples/epd_gb_frame_probe/main

boards_dir = boards

[env:t5_epd_probe]
platform = espressif32@6.5.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_ldf_mode = deep+

build_unflags =
    -Os

build_flags =
    -O3
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=4

lib_deps =
    Wire
